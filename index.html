<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Shipper Ultimate V3 - Full Features</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <style>
        :root { --primary: #007bff; --success: #28a745; --orange: #fd7e14; --danger: #dc3545; }
        body { display: flex; flex-direction: column; margin: 0; font-family: -apple-system, system-ui, sans-serif; height: 100vh; background: #f4f7f9; }
        #sidebar { width: 100%; max-height: 50vh; overflow-y: auto; background: white; padding: 15px; box-sizing: border-box; border-bottom: 2px solid #ddd; z-index: 1001; }
        #map { flex: 1; width: 100%; position: relative; }
        
        @media(min-width: 768px) {
            body { flex-direction: row; }
            #sidebar { width: 400px; height: 100vh; max-height: 100vh; border-right: 2px solid #ddd; }
        }

        .input-group { margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        button { width: 100%; padding: 12px; margin-top: 5px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 14px; }
        .btn-ocr { background: #6f42c1; }
        .btn-save { background: var(--success); }
        .btn-optimize { background: var(--orange); flex: 1; }
        .btn-route { background: var(--primary); flex: 1; }
        
        #distance-alert {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: var(--orange); color: white; padding: 10px 20px;
            border-radius: 25px; font-weight: bold; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .search-box { margin: 10px 0; border: 2px solid var(--primary); border-radius: 6px; padding: 5px; }
        .search-box input { border: none; width: 100%; outline: none; }

        .customer-item { background: #fff; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .gps-button {
            position: absolute; bottom: 30px; right: 20px; z-index: 1000;
            background: white; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 2px solid var(--primary); font-size: 26px;
        }
    </style>
</head>
<body>

<div id="distance-alert">🚀 ĐANG ĐẾN GẦN KHÁCH!</div>

<div id="sidebar">
    <h3 style="margin-top:0">📦 Shipper Pro V3</h3>
    
    <input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none">
    <button class="btn-ocr" onclick="document.getElementById('imageInput').click()">📷 QUÉT ĐƠN HÀNG (AI)</button>
    <div id="ocrStatus" style="display:none; color:var(--primary); font-size:12px; text-align:center">Đang nhận diện chữ...</div>

    <div class="input-group">
        <input type="text" id="custName" placeholder="Tên khách hàng">
        <input type="tel" id="custPhone" placeholder="Số điện thoại">
        <input type="text" id="custLatLng" readonly placeholder="Chạm bản đồ để lấy vị trí" style="background:#f9f9f9">
    </div>
    <button class="btn-save" onclick="luuKhachHang()">LƯU KHÁCH HÀNG</button>

    <div style="background:#f8f9fa; padding:10px; border-radius:8px; margin-top:10px">
        <strong>🚚 Lộ trình chờ:</strong>
        <div id="queueList" style="font-size:13px; margin:5px 0">Trống...</div>
        <div style="display:flex; gap:5px">
            <button class="btn-optimize" onclick="toiUuLoTrinh()">⚡ Tối ưu</button>
            <button class="btn-route" onclick="batDauLoTrinh()">🗺️ Dẫn đường</button>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="timKiem()" placeholder="🔍 Tìm tên hoặc SĐT...">
    </div>

    <div style="display:flex; gap:5px; margin-bottom:10px">
        <button onclick="xuatDuLieu()" style="background:#6c757d; font-size:11px">📥 Xuất File</button>
        <button onclick="document.getElementById('importFile').click()" style="background:#6c757d; font-size:11px">📤 Nhập File</button>
        <input type="file" id="importFile" style="display:none" onchange="nhapDuLieu(event)">
    </div>

    <div id="customerList"></div>
</div>

<div id="map">
    <div class="gps-button" onclick="timToiNgay()">📍</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
    var map = L.map('map', { zoomControl: false }).setView([10.76, 106.66], 13);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}').addTo(map);

    var customers = JSON.parse(localStorage.getItem('shipper_v3_db')) || [];
    var deliveryQueue = [];
    var userLocation = null;
    var userMarker = null;
    var routingControl = null;
    var alerted = false;

    // 1. GPS Liên tục
    navigator.geolocation.watchPosition(p => {
        userLocation = L.latLng(p.coords.latitude, p.coords.longitude);
        if (!userMarker) {
            userMarker = L.circleMarker(userLocation, {radius:9, color:'#fff', fillColor:'#007bff', fillOpacity:1, weight:3}).addTo(map);
        } else {
            userMarker.setLatLng(userLocation);
        }
        checkAlert();
        if (routingControl) {
            var wps = routingControl.getWaypoints();
            wps[0].latLng = userLocation;
            routingControl.setWaypoints(wps);
        }
    }, null, { enableHighAccuracy: true });

    function timToiNgay() { if(userLocation) map.flyTo(userLocation, 16); }

    // 2. Cảnh báo (Rung + Nói)
    function checkAlert() {
        if (deliveryQueue.length > 0 && userLocation) {
            var dist = userLocation.distanceTo(L.latLng(deliveryQueue[0].lat, deliveryQueue[0].lng));
            if (dist < 200 && !alerted) {
                alerted = true;
                document.getElementById('distance-alert').style.display = 'block';
                if(navigator.vibrate) navigator.vibrate([500, 200, 500]);
                var speech = new SpeechSynthesisUtterance("Sắp đến nhà " + deliveryQueue[0].name);
                speech.lang = 'vi-VN';
                window.speechSynthesis.speak(speech);
            } else if (dist > 250) { alerted = false; document.getElementById('distance-alert').style.display = 'none'; }
        }
    }

    // 3. OCR Quét ảnh
    document.getElementById('imageInput').addEventListener('change', function(e) {
        var file = e.target.files[0];
        document.getElementById('ocrStatus').style.display = 'block';
        Tesseract.recognize(file, 'vie').then(({ data: { text } }) => {
            document.getElementById('ocrStatus').style.display = 'none';
            var phone = text.match(/(0[3|5|7|8|9][0-9]{8})\b/);
            if(phone) document.getElementById('custPhone').value = phone[0];
            var lines = text.split('\n').filter(l => l.length > 5);
            if(lines.length > 0) document.getElementById('custName').value = lines[0].substring(0,20);
        });
    });

    // 4. Quản lý dữ liệu
    function luuKhachHang() {
        var name = document.getElementById('custName').value;
        var ll = document.getElementById('custLatLng').value;
        if(!name || !ll) return alert("Chưa có tên hoặc vị trí!");
        var pos = ll.split(',');
        customers.push({name: name, phone: document.getElementById('custPhone').value, lat: pos[0], lng: pos[1], history: []});
        localStorage.setItem('shipper_v3_db', JSON.stringify(customers));
        hienThiDanhSach();
        resetForm();
    }

    function hienThiDanhSach() {
        var h = '';
        customers.forEach((c, i) => {
            h += `<div class="customer-item">
                <b>${c.name}</b> - ${c.phone}
                <div style="display:flex; gap:5px; margin-top:8px">
                    <button style="background:var(--primary); padding:5px; font-size:11px" onclick="themQueue(${i})">+ Lộ trình</button>
                    <button style="background:#ffc107; color:black; padding:5px; font-size:11px" onclick="suaKhach(${i})">Sửa</button>
                    <button style="background:var(--danger); padding:5px; font-size:11px" onclick="xoaKhach(${i})">Xong/Xoá</button>
                </div>
            </div>`;
        });
        document.getElementById('customerList').innerHTML = h;
    }

    function themQueue(i) { deliveryQueue.push(customers[i]); capNhatQueueUI(); }
    function capNhatQueueUI() {
        document.getElementById('queueList').innerHTML = deliveryQueue.map((c, i) => `<div>${i+1}. ${c.name} <span onclick="deliveryQueue.splice(${i},1);capNhatQueueUI()" style="color:red">✖</span></div>`).join('');
    }

    function batDauLoTrinh() {
        if(!userLocation || !deliveryQueue.length) return alert("Thiếu GPS hoặc Đơn hàng!");
        if(routingControl) map.removeControl(routingControl);
        routingControl = L.Routing.control({
            waypoints: [userLocation, ...deliveryQueue.map(c => L.latLng(c.lat, c.lng))],
            language: 'vi',
            createMarker: (i, wp) => L.marker(wp.latLng).bindPopup(i==0?"Bạn":deliveryQueue[i-1].name)
        }).addTo(map);
    }

    function toiUuLoTrinh() {
        if(!userLocation) return alert("Chờ GPS!");
        deliveryQueue.sort((a,b) => userLocation.distanceTo(L.latLng(a.lat, a.lng)) - userLocation.distanceTo(L.latLng(b.lat, b.lng)));
        capNhatQueueUI();
        batDauLoTrinh();
    }

    function xuatDuLieu() {
        var blob = new Blob([JSON.stringify(customers)], {type: "application/json"});
        var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "shipper_backup.json"; a.click();
    }

    function nhapDuLieu(e) {
        var reader = new FileReader();
        reader.onload = function(event) {
            customers = JSON.parse(event.target.result);
            localStorage.setItem('shipper_v3_db', JSON.stringify(customers));
            hienThiDanhSach();
        };
        reader.readAsText(e.target.files[0]);
    }

    function timKiem() {
        var k = document.getElementById('searchInput').value.toLowerCase();
        var items = document.getElementsByClassName('customer-item');
        for(var i=0; i<items.length; i++) {
            items[i].style.display = items[i].innerText.toLowerCase().includes(k) ? "" : "none";
        }
    }

    map.on('click', e => {
        document.getElementById('custLatLng').value = e.latlng.lat.toFixed(6) + "," + e.latlng.lng.toFixed(6);
        L.marker(e.latlng).addTo(map);
    });

    function resetForm() { document.getElementById('custName').value=''; document.getElementById('custPhone').value=''; document.getElementById('custLatLng').value=''; }
    function suaKhach(i) { var c=customers[i]; document.getElementById('custName').value=c.name; document.getElementById('custPhone').value=c.phone; document.getElementById('custLatLng').value=c.lat+","+c.lng; customers.splice(i,1); hienThiDanhSach(); }
    function xoaKhach(i) { if(confirm("Giao xong?")) { customers.splice(i,1); localStorage.setItem('shipper_v3_db', JSON.stringify(customers)); hienThiDanhSach(); } }

    window.onload = () => hienThiDanhSach();
</script>
</body>
</html>
